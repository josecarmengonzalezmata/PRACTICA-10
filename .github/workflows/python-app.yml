name: Test and Build v3

on:
    push:
        branches: [ "main" ]

permissions:
    contents: read
    packages: write

jobs:
    test_and_build: 
        runs-on: ubuntu-latest  
        steps: 
            - uses: actions/checkout@v4
            - name: Set up Python 3.11 
              uses: actions/setup-python@v3
              with:
                python-version: "3.11"
            - name: Install dependencies 
              run: pip install -r requirements.txt
            
            # Verificacion de codigo con ruff 
            - name: Check code with ruff
              working-directory: src  
              run: ruff check .
            
              # Ejecucion de pruebas con pytest
            - name: Test with pytest 
              working-directory: src  
              run: pytest test.py

            # Construccion de la imagen Docker
            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            # Construccion y push de la imagen Docker a GitHub Container
            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                push: true
                tags: ghcr.io/josecarmengonzalezmata/practica-10:latest